<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Generate Chesscan Icons</title></head>
<body>
<script>
[16, 48, 128].forEach(size => {
  const canvas = document.createElement('canvas');
  canvas.width = canvas.height = size;
  const ctx = canvas.getContext('2d');

  const r = size * 0.18;
  ctx.fillStyle = '#161920';
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, r);
  ctx.fill();

  ctx.fillStyle = '#76c442';
  ctx.font = `${size * 0.664}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('♛', size / 2, size * 0.719);

  const a = document.createElement('a');
  a.download = `icon${size}.png`;
  a.href = canvas.toDataURL('image/png');
  a.textContent = `Download icon${size}.png`;
  a.style = 'display:block;margin:8px;font-size:16px';
  document.body.appendChild(a);
  a.click();
});
</script>
</body>
</html>
